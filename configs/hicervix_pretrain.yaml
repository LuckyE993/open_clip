train_data: outputs/hicervix_5cls_train_captions.tsv
val_data: outputs/hicervix_5cls_val_captions.tsv
dataset_type: csv
csv_separator: "\t"
csv_img_key: filepath
csv_caption_key: title

# model / initialization
model: RN50
pretrained: openai
precision: amp

# optimization (stage-1 pretrain)
batch_size: 64
epochs: 20
lr: 1.0e-4
wd: 1.0e-4
opt: adamw
warmup: 50

# runtime
workers: 8
seed: 42
accum_freq: 1

# logging / checkpoints
name: hicervix_pretrain_rn50
log_every_n_steps: 50
save_frequency: 0
val_frequency: 1
zeroshot_frequency: 0
save_best_model: true
