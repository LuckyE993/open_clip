data:
  csv_path: ./outputs/hicervix_5cls_train.csv
  image_root: ../datasets/hicervix/train
  # csv_path: ./outputs/hicervix_5cls_val.csv
  # image_root: ../datasets/hicervix/val
  # csv_path: ./outputs/hicervix_5cls_test.csv
  # image_root: ../datasets/hicervix/test
  # image_mode: base64 | file_url | path
  image_mode: base64
  # If set, overrides local image loading:
  # image_url_prefix: https://your-bucket/path

output:
  jsonl_path: outputs/hicervix_5cls_train_captions.jsonl

prompt:
  template: >-
    Task: Describe the cervical cytology image for class {class_name}.
    Example style: 'Small cluster of 4-5 cells. Nuclei mildly enlarged. Chromatin slightly granular. Abundant cytoplasm with distinct borders.'
    Your Description:

model:
  name: Qwen/Qwen3.5-397B-A17B

# Reproducibility controls
seed: 42

deterministic: true

# Sampling/decoding hyperparameters
params:
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  max_tokens: 100
  presence_penalty: 0.0
  frequency_penalty: 0.0
  repetition_penalty: 1.0

run:
  stream: false
  timeout: 120
  max_retries: 3
  backoff: 1.5
  resume: true
  use_seed: true
  show_progress: true
