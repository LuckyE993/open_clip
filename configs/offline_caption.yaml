data:
  # csv_path: outputs/25per_NILMsum/hicervix_5cls_train.csv
  # image_root: ../datasets/hicervix/train
  csv_path: ./outputs/25per_NILMsum/hicervix_5cls_val.csv
  image_root: ../datasets/hicervix/val
  # csv_path: ./outputs/hicervix_5cls_test.csv
  # image_root: ../datasets/hicervix/test
  # image_mode: base64 | file_url | path
  image_mode: base64
  # If set, overrides local image loading:
  # image_url_prefix: https://your-bucket/path

output:
  jsonl_path: outputs/25per_NILMsum/hicervix_5cls_val_captions.jsonl

# prompt:
#   template: >-
#     Task: Describe the cervical cytology image for class {class_name}.
#     Example style: 'Small cluster of 4-5 cells. Nuclei mildly enlarged. Chromatin slightly granular. Abundant cytoplasm with distinct borders.'
#     Your Description:

prompt:
  template: >-
    Task: Act as an expert cytopathologist. Generate a precise morphological description for a cervical cytology image of class {class_name}.
    
    Guidelines:
    1. Focus on: Cell arrangement (isolated/clusters), Nuclear features (size, shape, membrane, chromatin), Cytoplasm (amount, color, borders), and N/C ratio (Nuclear-to-Cytoplasmic ratio).
    2. Use professional terminology (e.g., hyperchromasia, pleomorphism, perinuclear halo).
    3. Do NOT use filler phrases like "The image shows" or "This is". 
    4. Ensure the description justifies the diagnosis of {class_name}.
    
    Style Examples:
    - NILM: 'Superficial squamous cells with small, pyknotic nuclei and abundant, translucent cytoplasm. Regular nuclear membranes.'
    - HSIL: 'Small, immature cells with a very high N/C ratio. Nuclei show marked hyperchromasia and irregular nuclear membranes with coarse chromatin.'
    
    Your Description for {class_name}:

model:
  name: Qwen2.5-VL-7B-Instruct-AWQ

# Reproducibility controls
seed: 42

deterministic: true

# Sampling/decoding hyperparameters
params:
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  max_tokens: 100
  presence_penalty: 0.0
  frequency_penalty: 0.0
  repetition_penalty: 1.0

run:
  stream: false
  timeout: 120
  max_retries: 3
  backoff: 1.5
  resume: true
  use_seed: true
  show_progress: true
